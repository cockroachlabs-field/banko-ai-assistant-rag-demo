name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff check
        run: ruff check banko_ai/

      - name: Ruff format check
        run: ruff format --check banko_ai/
        continue-on-error: true

      - name: Mypy type check
        run: mypy banko_ai/ --ignore-missing-imports
        continue-on-error: true

  imports:
    name: Verify Imports (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify all modules import cleanly
        run: |
          python -c "
          from banko_ai.utils.crdb_engine import get_crdb_engine, close_crdb_engine, normalize_crdb_url
          print('crdb_engine OK')
          from banko_ai.vector_search.crdb_vectorstore import get_vectorstore, search_expenses_via_vectorstore, index_expense_document, bulk_index_expenses
          print('crdb_vectorstore OK')
          from banko_ai.utils.crdb_chat_history import get_chat_history
          print('crdb_chat_history OK')
          from banko_ai.agents.receipt_workflow import build_receipt_graph, run_receipt_workflow, ReceiptWorkflowState
          print('receipt_workflow OK')
          from langchain_cockroachdb import CockroachDBEngine, CockroachDBVectorStore, CockroachDBChatMessageHistory, CockroachDBSaver, CSPANNIndex, DistanceStrategy
          print('langchain_cockroachdb OK')
          "

      - name: Verify LangGraph builds
        run: |
          python -c "
          from banko_ai.agents.receipt_workflow import build_receipt_graph
          graph = build_receipt_graph()
          nodes = list(graph.nodes.keys())
          assert 'receipt' in nodes and 'fraud' in nodes and 'budget' in nodes
          print(f'LangGraph OK: {nodes}')
          "

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, imports]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (no DB required)
        run: |
          python -m pytest tests/test_env_config.py -v --tb=short || true
        env:
          AI_SERVICE: openai
          DATABASE_URL: "cockroachdb://root@localhost:26257/defaultdb?sslmode=disable"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          python -c "import banko_ai; print('Package install OK')"
