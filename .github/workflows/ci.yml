name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: uv pip install --system ruff mypy

      - name: Ruff check
        run: ruff check banko_ai/

      - name: Ruff format check
        run: ruff format --check banko_ai/
        continue-on-error: true

      - name: Mypy type check
        run: mypy banko_ai/ --ignore-missing-imports
        continue-on-error: true

  imports:
    name: Verify Imports (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Verify all modules import cleanly
        run: |
          python -c "
          from banko_ai.utils.crdb_engine import get_crdb_engine, close_crdb_engine, normalize_crdb_url
          print('crdb_engine OK')
          from banko_ai.vector_search.crdb_vectorstore import get_vectorstore, search_expenses_via_vectorstore, index_expense_document, bulk_index_expenses
          print('crdb_vectorstore OK')
          from banko_ai.utils.crdb_chat_history import get_chat_history
          print('crdb_chat_history OK')
          from banko_ai.agents.receipt_workflow import build_receipt_graph, run_receipt_workflow, ReceiptWorkflowState
          print('receipt_workflow OK')
          from langchain_cockroachdb import CockroachDBEngine, CockroachDBVectorStore, CockroachDBChatMessageHistory, CockroachDBSaver, CSPANNIndex, DistanceStrategy
          print('langchain_cockroachdb OK')
          "

      - name: Verify LangGraph builds
        run: |
          python -c "
          from banko_ai.agents.receipt_workflow import build_receipt_graph
          graph = build_receipt_graph()
          nodes = list(graph.nodes.keys())
          assert 'receipt' in nodes and 'fraud' in nodes and 'budget' in nodes
          print(f'LangGraph OK: {nodes}')
          "

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, imports]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Start CockroachDB
        run: |
          docker run -d --name cockroachdb \
            -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:latest \
            start-single-node --insecure
          for i in {1..30}; do
            if docker exec cockroachdb cockroach sql --insecure --execute "SELECT 1" 2>/dev/null; then
              echo "CockroachDB ready"
              break
            fi
            sleep 2
          done

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_env_config.py --ignore=tests/test_all_providers.py
        env:
          AI_SERVICE: openai
          DATABASE_URL: "cockroachdb://root@localhost:26257/defaultdb?sslmode=disable"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          uv pip install --system build pkginfo
          python -m build

      - name: Verify wheel contents
        run: |
          python -c "
          import glob, pkginfo
          whl = glob.glob('dist/*.whl')[0]
          w = pkginfo.Wheel(whl)
          print(f'Package: {w.name} v{w.version}')
          print(f'Requires: {w.requires_dist[:5]}...')
          print('Build OK')
          "
